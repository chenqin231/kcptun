# kcptun 多架构二进制发布。
# 打 tag(v*) 或手动触发即可,在单个 Linux runner 上用纯 Go 交叉编译 client+server 全平台,
# 打包 tar.gz/zip + sha256 后发布到 GitHub Release。
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布用的 tag(如 v20260624);留空则用 manual-<run_number>'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve version & tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF##*/}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="manual-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$TAG" | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          echo "解析得到 tag=$TAG"

      - name: Cross compile (client + server)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          # 用独立输出目录,避免撞上仓库已有的 dist/(内含 freebsd、linux 等子目录)
          rm -rf release-out && mkdir -p release-out
          LDFLAGS="-X main.VERSION=$VERSION -s -w"
          # 目标矩阵: GOOS GOARCH 后缀 产物归档名
          targets=(
            "windows amd64 .exe windows-amd64"
            "darwin  amd64 ''   macos-amd64"
            "darwin  arm64 ''   macos-arm64"
            "linux   amd64 ''   linux-amd64"
            "linux   arm64 ''   linux-arm64"
          )
          for t in "${targets[@]}"; do
            read -r GOOS GOARCH SUF NAME <<< "$t"
            [ "$SUF" = "''" ] && SUF=""
            echo "==> building $GOOS/$GOARCH"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -mod=vendor -trimpath -ldflags "$LDFLAGS" -o "client_${NAME}${SUF}" ./client
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -mod=vendor -trimpath -ldflags "$LDFLAGS" -o "server_${NAME}${SUF}" ./server
            if [ "$GOOS" = "windows" ]; then
              zip -q "release-out/kcptun-${NAME}.zip" "client_${NAME}${SUF}" "server_${NAME}${SUF}"
            else
              tar -czf "release-out/kcptun-${NAME}.tar.gz" "client_${NAME}${SUF}" "server_${NAME}${SUF}"
            fi
            rm -f "client_${NAME}${SUF}" "server_${NAME}${SUF}"
          done
          cd release-out && sha256sum * > SHA256SUMS.txt
          echo "----- 产物清单 -----"
          ls -lh

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: kcptun ${{ steps.meta.outputs.tag }}
          body: |
            kcptun client + server 多架构二进制。

            | 平台 | 文件 |
            |------|------|
            | Windows x64 | kcptun-windows-amd64.zip |
            | macOS Intel | kcptun-macos-amd64.tar.gz |
            | macOS Apple Silicon | kcptun-macos-arm64.tar.gz |
            | Linux x86_64 | kcptun-linux-amd64.tar.gz |
            | Linux ARM64 | kcptun-linux-arm64.tar.gz |

            校验: `SHA256SUMS.txt`。server 部署见仓库 `deploy/`。
          files: release-out/*
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-rc') }}
